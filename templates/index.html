<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>find-proxy</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2em auto; padding: 0 1em; }
  h1 { margin-bottom: 0.2em; }
  form { display: flex; gap: 0.5em; margin: 1em 0; }
  input[type=text] { flex: 1; padding: 0.5em; font-size: 1em; font-family: monospace; }
  button { padding: 0.5em 1em; font-size: 1em; cursor: pointer; }
  .error { color: #b00; background: #fee; padding: 0.7em 1em; border: 1px solid #fbb; border-radius: 4px; }
  .hint { color: #666; font-size: 0.9em; }
  nav { display: flex; gap: 1em; margin-bottom: 1em; font-size: 0.95em; }
  nav a { color: #0366d6; text-decoration: none; }
  nav a.active { font-weight: bold; color: #222; }
</style>
</head>
<body>
  <nav>
    <a class="active" href="{{ url_for('index') }}">поиск по nginx</a>
    <a href="{{ url_for('requestfromsite') }}">запросы с сайта</a>
  </nav>
  <h1>поиск по логу nginx</h1>
  <p class="hint">Введите один или несколько паттернов через пробел</p>
  <form action="{{ url_for('search') }}" method="post">
    <input type="text" name="q" value="{{ query|e }}" autofocus placeholder="введите номер заказа">
    <button type="submit">Искать</button>
  </form>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
</body>
</html>
